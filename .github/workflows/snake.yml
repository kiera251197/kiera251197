name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: kiera251197
          outputs: |
            dist/github-snake.svg?color_snake=#aed1b8&color_dots=#161b22,#f3b0c333,#f3b0c373,#f3b0c3b3,#f3b0c3
            dist/github-snake-dark.svg?color_snake=#aed1b8&color_dots=#161b22,#f3b0c333,#f3b0c373,#f3b0c3b3,#f3b0c3
            
      - name: Push to output branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output
